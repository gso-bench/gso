exp_id: numpy
repo_url: https://github.com/numpy/numpy
py_version: "3.11"
install_commands:
  - git clean -xfd
  - uv venv --python 3.11
  - source .venv/bin/activate
  - which python
  - python --version
  - git submodule update --init
  - ( uv pip install . --reinstall ) || ( git clean -xfd && uv venv --python 3.10 && source .venv/bin/activate && uv pip install "setuptools<=59.8.0" "cython<0.30" && uv run python setup.py build_ext --inplace )
  - uv pip install requests dill pillow
  - uv pip show numpy