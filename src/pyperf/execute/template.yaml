name: $id

resources:
  cloud: $cloud
  region: $region
  instance_type: $instance_type

workdir: .

setup: |
  sudo apt-get update
  sudo apt-get install -y python3-pip git build-essential python3-dev python3-setuptools
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.cargo/env
  $setup_commands
  git clone $repo_url

run: |
  cd $repo_name
  git checkout $before_commit
  $install_commands_before
  
  cd ..
  echo "Running test.py with version before the commit..."
  for i in {1..5}; do
    python test.py -f $file_before
  done

  cd $repo_name
  git checkout $after_commit
  $install_commands_after
  
  cd ..
  echo "Running test.py with version after the commit..."
  for i in {1..5}; do
    python test.py -f $file_after
  done

  echo "Task complete on $(hostname)"