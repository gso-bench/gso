exp_id: datasets
repo_url: https://github.com/huggingface/datasets
py_version: "3.9"
install_commands:
  - uv venv --python 3.9
  - source .venv/bin/activate
  - which python
  - python --version
  - uv pip install . --reinstall
  - uv pip install requests dill sqlalchemy pillow absl-py decorator zstandard pyspark
  - uv pip show datasets
